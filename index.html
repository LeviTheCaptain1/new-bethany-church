<div class="contact-form-container">
    <form onsubmit="event.preventDefault(); alert('Thank you for reaching out! We will get back to you shortly.'); this.reset();">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Your name">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="Your email address">
        </div>
        <div class="form-group">
            <label for="message">How can we pray for or assist you?</label>
            <textarea id="message" rows="4" maxlength="500" required placeholder="Write your message here..."></textarea>
            <span style="font-size: 0.75rem; color: #64748b; display: block; margin-top: 4px; text-align: right;">Maximum 500 characters</span>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Send Message</button>
    </form>
</div>
